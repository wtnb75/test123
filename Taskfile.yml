# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  GAMES:
    - first-game
    - editmin

tasks:
  default:
    desc: task list
    cmds:
      - task -l --sort alphanumeric
    silent: true

  build:games:
    desc: build games
    cmds:
      - for:
          var: GAMES
        cmd: cd {{ .ITEM }} && npm run build

  build:output:
    desc: build output
    cmds:
      - rm -rf output
      - for:
          var: GAMES
        cmd: rsync -av {{ .ITEM }}/dist/ output/{{ .ITEM }}/
      - |
        cat <<EOF > output/index.html
        <!doctype html>
        <html lang="ja">
        <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>test 123</title>
          <style>
            :root {
              --bg-1: #e7f5ff;
              --bg-2: #fff4e6;
              --card: #ffffffcc;
              --text: #1f2937;
              --muted: #6b7280;
              --accent: #0f766e;
              --accent-2: #115e59;
              --ring: #99f6e4;
              --radius: 16px;
            }

            * {
              box-sizing: border-box;
            }

            body {
              margin: 0;
              min-height: 100vh;
              color: var(--text);
              background:
                radial-gradient(circle at 20% 10%, #ffffff 0%, transparent 35%),
                radial-gradient(circle at 90% 90%, #fff 0%, transparent 30%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
              font-family: "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
            }

            .page {
              width: min(920px, calc(100% - 2rem));
              margin: 3rem auto;
              padding: 2rem;
              border-radius: calc(var(--radius) + 6px);
              background: var(--card);
              border: 1px solid #ffffff;
              box-shadow: 0 20px 50px #0f172a1f;
              backdrop-filter: blur(8px);
            }

            h1 {
              margin: 0 0 0.5rem;
              font-size: clamp(1.6rem, 3vw, 2.2rem);
              letter-spacing: 0.01em;
            }

            .lead {
              margin: 0 0 1.4rem;
              color: var(--muted);
              font-size: 0.98rem;
            }

            ul {
              list-style: none;
              margin: 0;
              padding: 0;
              display: grid;
              gap: 0.85rem;
            }

            a {
              display: flex;
              align-items: center;
              justify-content: space-between;
              gap: 1rem;
              text-decoration: none;
              color: inherit;
              padding: 0.95rem 1rem;
              border-radius: var(--radius);
              border: 1px solid #e5e7eb;
              background: #fff;
              transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
            }

            a::after {
              content: "→";
              color: var(--accent);
              font-weight: 700;
            }

            a:hover {
              transform: translateY(-1px);
              border-color: var(--ring);
              box-shadow: 0 10px 22px #0f766e22;
            }

            a:focus-visible {
              outline: 3px solid var(--ring);
              outline-offset: 2px;
            }

            .name {
              font-weight: 600;
            }

            .path {
              color: var(--muted);
              font-size: 0.88rem;
            }

            @media (max-width: 640px) {
              .page {
                margin: 1.25rem auto;
                padding: 1.2rem;
              }
            }
          </style>
        </head>
        <body>
          <main class="page">
            <h1>test 123</h1>
            <p class="lead">公開中のゲーム一覧。下のリンクから各ページを開けます。</p>
            <ul>
            {{- range .GAMES }}
              <li>
                <a href="{{ . }}/">
                  <span class="name">{{ . }}</span>
                  <span class="path">/{{ . }}/</span>
                </a>
              </li>
            {{- end }}
            </ul>
          </main>
        </body>
        </html>
        EOF

  audit:
    desc: audit fix
    cmds:
      - for:
          var: GAMES
        cmd: cd {{ .ITEM }} && npm audit fix

  deploy:
    desc: deploy to gh pages
    cmds:
      - task: build:games
      - task: build:output
      - |
        cd output
        touch .nojekyll
        git init
        git checkout -b gh-pages
        git add -A .
        git commit -m 'pages'
        git remote add origin https://github.com/wtnb75/test123.git
        git push -f origin gh-pages

  pkgmod:
    desc: modify package of PACKAGE=
    preconditions:
      - "test -f {{ .PACKAGE }}/package.json"
    cmds:
      - jq -s '.[0] * .[1]' {{ .PACKAGE }}/package.json base.json | sed -e
        's,__NAME__,{{ .PACKAGE }},g;' > {{ .PACKAGE }}/package.json.new
      - mv {{ .PACKAGE }}/package.json.new {{ .PACKAGE }}/package.json
